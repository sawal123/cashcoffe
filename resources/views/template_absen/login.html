<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#b6c4ff",
                    "outline-variant": "#c5c5d3",
                    "on-primary-fixed-variant": "#264191",
                    "primary": "#00236f",
                    "on-secondary-container": "#54647a",
                    "on-secondary-fixed": "#0b1c30",
                    "on-background": "#191c1e",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#004395",
                    "surface-container-highest": "#e0e3e5",
                    "on-secondary-fixed-variant": "#38485d",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "secondary-container": "#d0e1fb",
                    "secondary-fixed": "#d3e4fe",
                    "primary-fixed-dim": "#b6c4ff",
                    "primary-fixed": "#dce1ff",
                    "inverse-on-surface": "#eff1f3",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f7f9fb",
                    "on-tertiary-container": "#82abff",
                    "on-primary-fixed": "#00164e",
                    "surface-container-low": "#f2f4f6",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-primary-container": "#90a8ff",
                    "tertiary-container": "#003d88",
                    "surface-container": "#eceef0",
                    "primary-container": "#1e3a8a",
                    "on-surface-variant": "#444651",
                    "tertiary-fixed-dim": "#adc6ff",
                    "inverse-surface": "#2d3133",
                    "on-tertiary-fixed": "#001a42",
                    "tertiary-fixed": "#d8e2ff",
                    "surface-variant": "#e0e3e5",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#191c1e",
                    "surface-dim": "#d8dadc",
                    "background": "#f7f9fb",
                    "surface": "#f7f9fb",
                    "secondary": "#505f76",
                    "on-primary": "#ffffff",
                    "tertiary": "#00285e",
                    "surface-tint": "#4059aa",
                    "outline": "#757682",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "desktop-max-width": "1280px",
                    "gutter": "16px",
                    "stack-md": "12px",
                    "stack-lg": "24px",
                    "base": "8px",
                    "stack-sm": "4px",
                    "container-margin": "24px"
            },
            "fontFamily": {
                    "button": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "body-lg": ["Inter"],
                    "title-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "button": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8FAFC;
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter">
<main class="w-full max-w-[400px] flex flex-col items-center space-y-stack-lg">
<!-- Brand Header Section -->
<header class="flex flex-col items-center space-y-stack-md text-center">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" data-icon="sync">sync</span>
</div>
<div class="space-y-base">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">WorkSync</h1>
<p class="font-body-lg text-body-lg text-secondary">Selamat Datang</p>
</div>
</header>
<!-- Login Form Container -->
<section class="w-full bg-surface-container-lowest border border-outline-variant p-container-margin rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
<form class="space-y-stack-lg" onsubmit="return false;">
<!-- Input Group: Employee ID -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="employee-id">Employee ID</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="badge">badge</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="employee-id" name="employee-id" placeholder="Masukkan ID Pegawai" type="text"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Kata Sandi</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Lupa Kata Sandi?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container hover:text-on-primary py-3.5 rounded-lg font-button text-button transition-all duration-200 active:scale-[0.98] shadow-sm" type="submit">
                    Masuk
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-stack-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-3 font-label-md text-label-md text-outline-variant uppercase">Atau</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Biometric Action -->
<button class="w-full flex items-center justify-center space-x-base py-3 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors font-button text-button text-on-surface-variant active:opacity-80">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
<span>Masuk dengan Biometrik</span>
</button>
</section>
<!-- Footer / Support Link -->
<footer class="text-center">
<p class="font-body-md text-body-md text-secondary">
                Kendala saat masuk? <a class="text-primary font-semibold hover:underline" href="#">Hubungi IT Support</a>
</p>
</footer>
</main>
<!-- Decorative Elements for the background -->
<div class="fixed top-0 right-0 p-12 opacity-5 pointer-events-none hidden md:block">
<span class="material-symbols-outlined text-[300px] text-primary" data-icon="schedule">schedule</span>
</div>
<div class="fixed bottom-0 left-0 p-12 opacity-5 pointer-events-none hidden md:block">
<span class="material-symbols-outlined text-[200px] text-primary" data-icon="verified_user">verified_user</span>
</div>
</body></html>
